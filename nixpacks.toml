# Nixpacks configuration for Railway deployment
# Ensures OpenSSL is available for Prisma engine binaries

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["npx prisma generate", "pnpm build"]

[start]
cmd = "npx prisma db push && node dist/main"