# Nixpacks configuration for Railway deployment
# Uses Debian-based builder (NOT Alpine) — Prisma works correctly on Debian

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["npm install -g pnpm", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "node dist/main"
